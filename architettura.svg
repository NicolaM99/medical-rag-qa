  </text>
  <text x="450" y="57" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    BioMistral-7B · Hybrid Retrieval (BM25 + PubMedBERT + RRF) · QLoRA Fine-Tuning
  </text>

  <!-- Input -->
  <rect x="330" y="84" width="240" height="50" rx="6" fill="#1A1A2E"/>
  <text x="450" y="105" text-anchor="middle" font-size="12" fill="white" font-weight="bold">
    Query Clinica
  </text>
  <text x="450" y="122" text-anchor="middle" font-size="10" fill="#AAB4CC">
    What is the WBC of patient 12345?
  </text>

  <!-- Arrow -->
  <line x1="450" y1="134" x2="450" y2="158" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Output -->
  <rect x="310" y="522" width="280" height="60" rx="6" fill="#1B5E20"/>
  <text x="450" y="546" text-anchor="middle" font-size="12" fill="white" font-weight="bold">
    Risposta Finale
  </text>
  <text x="450" y="562" text-anchor="middle" font-size="10" fill="#A5D6A7">
    WBC: 12.3 K/uL
  </text>
  <text x="450" y="576" text-anchor="middle" font-size="9" fill="#81C784">
    oppure NO_ANSWER
  </text>

</svg>
